<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniMina — Controle de Uniformes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f2f4;
  --surface: #ffffff;
  --surface2: #f5f6f8;
  --surface3: #eceef1;
  --border: #dde1e7;
  --primary: #8B1A1A;
  --primary2: #a82020;
  --primary-dim: #f5e6e6;
  --primary-bg: rgba(139,26,26,0.08);
  --teal: #1e3a3a;
  --teal2: #2a4f4f;
  --teal-bg: rgba(30,58,58,0.08);
  --text: #1a2a2a;
  --text-muted: #5a6a6a;
  --text-dim: #9aaaaa;
  --danger: #c0392b;
  --danger-bg: rgba(192,57,43,0.1);
  --success: #1a7a4a;
  --success-bg: rgba(26,122,74,0.1);
  --info: #1a4a7a;
  --info-bg: rgba(26,74,122,0.1);
  --warn: #b85c00;
  --warn-bg: rgba(184,92,0,0.1);
  --sidebar-w: 220px;
  --amber: #8B1A1A;
  --amber2: #a82020;
  --amber-dim: #6a1010;
  --amber-bg: rgba(139,26,26,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;overflow:hidden;}

/* SIDEBAR */
#sidebar {
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100%;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  box-shadow:2px 0 8px rgba(0,0,0,0.06);
}
.sb-logo {
  padding:20px 16px 16px;border-bottom:1px solid var(--border);
}
.sb-logo .brand {
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:800;
  color:var(--teal);letter-spacing:1px;line-height:1;
}
.sb-logo .brand span{color:var(--primary);}
.sb-logo .sub {
  font-size:10px;color:var(--text-muted);font-weight:500;
  letter-spacing:2px;text-transform:uppercase;margin-top:3px;
}
.sb-nav {flex:1;padding:12px 0;overflow-y:auto;}
.sb-item {
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:600;letter-spacing:0.5px;
  text-transform:uppercase;color:var(--text-muted);
  border-left:3px solid transparent;
  transition:all .15s;border-radius:0 6px 6px 0;margin-right:8px;
}
.sb-item:hover{color:var(--teal);background:var(--teal-bg);}
.sb-item.active{color:var(--primary);background:var(--primary-bg);border-left-color:var(--primary);}
.sb-item .icon{font-size:18px;width:22px;text-align:center;flex-shrink:0;}
.sb-section {
  font-size:10px;font-weight:700;letter-spacing:2px;
  color:var(--text-dim);padding:16px 16px 4px;
  text-transform:uppercase;
}
.sb-footer {
  padding:12px 16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-dim);
}
.sb-footer span{color:var(--primary);font-weight:600;}

/* MAIN */
#main {
  margin-left:var(--sidebar-w);height:100%;
  display:flex;flex-direction:column;overflow:hidden;
}
.topbar {
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.page-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:700;letter-spacing:0.5px;
  color:var(--teal);
}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content {flex:1;overflow-y:auto;padding:24px;}

/* BUTTONS */
.btn {
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:4px;border:none;
  cursor:pointer;font-family:'Barlow',sans-serif;
  font-size:13px;font-weight:600;transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary2);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface3);border-color:#bbb;}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,.3);}
.btn-danger:hover{background:rgba(192,57,43,.2);}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(26,122,74,.3);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}

/* CARDS */
.card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;position:relative;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
}
.stat-card.amber::before{background:var(--primary);}
.stat-card.green::before{background:var(--success);}
.stat-card.red::before{background:var(--danger);}
.stat-card.blue::before{background:var(--info);}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1.1;margin-top:4px;}
.stat-card.amber .stat-value{color:var(--primary);}
.stat-card.green .stat-value{color:var(--success);}
.stat-card.red .stat-value{color:var(--danger);}
.stat-card.blue .stat-value{color:var(--info);}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,0.04);}
table{width:100%;border-collapse:collapse;background:var(--surface);}
th{
  background:var(--teal);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:rgba(255,255,255,0.85);
  padding:10px 12px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  padding:9px 12px;border-bottom:1px solid var(--border);
  font-size:13px;vertical-align:middle;color:var(--text);
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(30,58,58,0.03);}

/* BADGES */
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
}
.badge-pending{background:var(--warn-bg);color:var(--warn);}
.badge-approved{background:var(--info-bg);color:var(--info);}
.badge-delivered{background:var(--success-bg);color:var(--success);}
.badge-low{background:var(--danger-bg);color:var(--danger);}
.badge-ok{background:var(--success-bg);color:var(--success);}
.badge-empty{background:rgba(192,57,43,.15);color:var(--danger);}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:5px;}
.form-control {
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;color:var(--text);padding:8px 10px;
  font-family:'Barlow',sans-serif;font-size:13px;
  transition:border-color .15s;
}
.form-control:focus{outline:none;border-color:var(--primary);}
.form-control option{background:var(--surface);}
.form-grid{display:grid;gap:12px;}
.form-grid-2{grid-template-columns:1fr 1fr;}
.form-grid-3{grid-template-columns:1fr 1fr 1fr;}

/* MODALS */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);
  z-index:999;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;width:600px;max-width:95vw;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
}
.modal-lg{width:800px;}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--teal);border-radius:10px 10px 0 0;
}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:20px;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* SEARCH */
.search-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;display:flex;align-items:center;gap:8px;
  padding:6px 10px;
}
.search-box input{
  background:none;border:none;color:var(--text);
  font-family:'Barlow',sans-serif;font-size:13px;outline:none;
  width:220px;
}
.search-box .icon{color:var(--text-muted);}

/* ALERT */
.alert{padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:13px;}
.alert-warn{background:var(--warn-bg);border-left:3px solid var(--warn);color:var(--warn);}
.alert-danger{background:var(--danger-bg);border-left:3px solid var(--danger);color:var(--danger);}
.alert-success{background:var(--success-bg);border-left:3px solid var(--success);color:var(--success);}
.alert-info{background:var(--info-bg);border-left:3px solid var(--info);color:var(--info);}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:4px;}
.tab{
  padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;
  color:var(--text-muted);border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;
}
.tab:hover{color:var(--teal);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* SECTION TITLE */
.section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;color:var(--teal);
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:2px solid var(--primary-dim);
}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);}
.empty-state .icon{font-size:36px;margin-bottom:10px;}
.empty-state p{font-size:13px;}

/* TAGS */
.turma-badge{
  display:inline-block;padding:2px 8px;border-radius:3px;
  font-size:11px;font-weight:700;background:var(--teal-bg);
  color:var(--teal);border:1px solid rgba(30,58,58,0.2);
}

/* ITENS PEDIDO */
.itens-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.item-row{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;
}
.item-row select,.item-row input{flex:1;min-width:0;}
.item-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:2px;}

/* FICHA PRINT */
@media print {
  #sidebar,#main,#modal-overlay-global,.topbar-actions{display:none!important;}
  body{background:#fff!important;color:#000!important;margin:0;padding:0;}
  #print-area{display:block!important;position:fixed;top:0;left:0;width:100%;z-index:99999;background:#fff;}
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
#print-area{display:none;}

/* FICHA VISUAL */
.ficha-print {
  background:#fff;color:#000;padding:20mm 15mm;
  font-family:Arial,sans-serif;font-size:10pt;
  max-width:210mm;margin:auto;
}
.ficha-header{
  display:flex;align-items:center;justify-content:space-between;
  border:2px solid #1e3a3a;padding:8px 12px;margin-bottom:6px;
  background:#1e3a3a;
}
.ficha-header .company{font-size:9pt;color:#fff;font-weight:bold;}
.ficha-header .title{text-align:center;font-weight:bold;font-size:13pt;line-height:1.2;color:#fff;}
.ficha-header .doc-info{text-align:right;font-size:8pt;color:rgba(255,255,255,0.7);}
.ficha-emp-box{
  border:1px solid #1e3a3a;padding:8px;
  display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;
  margin-bottom:6px;font-size:9pt;
}
.ficha-emp-box .field{border-bottom:1px solid #ccc;padding:2px 0;}
.ficha-emp-box .field label{font-weight:bold;font-size:8pt;color:#1e3a3a;}
.ficha-tbl{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:9pt;}
.ficha-tbl th{background:#1e3a3a;color:#fff;padding:5px 8px;text-align:center;border:1px solid #1e3a3a;font-size:8pt;}
.ficha-tbl td{padding:5px 8px;border:1px solid #aaa;text-align:center;min-height:20px;}
.ficha-tbl tr:nth-child(even) td{background:#f9f9f9;}
.ficha-legal{font-size:7.5pt;text-align:justify;margin-bottom:10px;line-height:1.4;border:1px solid #ccc;padding:8px;}
.ficha-sig{display:flex;justify-content:space-around;margin-top:16px;}
.sig-line{text-align:center;width:200px;}
.sig-line .line{border-top:1px solid #333;margin-bottom:4px;}
.sig-line small{font-size:8pt;color:#555;}

/* SCROLL */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#aaa;}

/* DRAG IMPORT */
.drop-zone{
  border:2px dashed var(--border);border-radius:8px;
  padding:32px;text-align:center;color:var(--text-muted);
  transition:all .2s;cursor:pointer;background:var(--surface);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}
.drop-zone .icon{font-size:28px;margin-bottom:8px;}
.drop-zone p{font-size:13px;}
.drop-zone small{font-size:11px;color:var(--text-dim);}

/* ESTOQUE INLINE EDIT */
.qty-cell{display:flex;align-items:center;gap:6px;}
.qty-cell input{
  width:60px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;
  text-align:center;
}
.qty-cell input:focus{outline:none;border-color:var(--primary);}

/* RESPONSIVO */
@media (max-width:900px){
  .stat-cards{grid-template-columns:1fr 1fr;}
  .charts-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="brand">⛏ UNI<span>MINA</span></div>
    <div class="sub">Gerência de Operação Mina</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Principal</div>
    <div class="sb-item active" onclick="navigate('dashboard')">
      <span class="icon">📊</span>Dashboard
    </div>
    <div class="sb-item" onclick="navigate('pedidos')">
      <span class="icon">📋</span>Pedidos
    </div>
    <div class="sb-item" onclick="navigate('fichas')">
      <span class="icon">👤</span>Fichas
    </div>
    <div class="sb-item" onclick="navigate('movimentacoes')">
      <span class="icon">🔄</span>Movimentações
    </div>
    <div class="sb-section">Operação</div>
    <div class="sb-item" onclick="navigate('estoque')">
      <span class="icon">📦</span>Estoque
    </div>
    <div class="sb-item" onclick="navigate('relatorios')">
      <span class="icon">📄</span>Relatórios
    </div>
    <div class="sb-section">Configuração</div>
    <div class="sb-item" onclick="navigate('importar')">
      <span class="icon">⬆</span>Importar Excel
    </div>
    <div class="sb-item" onclick="navigate('funcionarios')">
      <span class="icon">👥</span>Funcionários
    </div>
    <div class="sb-item" onclick="navigate('manual')">
      <span class="icon">📖</span>Manual de Uso
    </div>
  </nav>
  <div class="sb-footer">v1.0 <span style="background:#f59e0b;color:#000;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:800">DEMO</span> &nbsp;|&nbsp; <span>GitHub Pages</span></div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="app-content"></div>
</div>

<!-- GLOBAL MODAL -->
<div class="modal-overlay" id="modal-overlay-global">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- PRINT AREA -->
<div id="print-area"></div>

<script>
// ─── DATA STORE ───────────────────────────────────────────────────
const DB = {
  get funcionarios(){ return JSON.parse(localStorage.getItem('um_func')||'[]'); },
  set funcionarios(v){ localStorage.setItem('um_func', JSON.stringify(v)); },
  get estoque(){ return JSON.parse(localStorage.getItem('um_estq')||'[]'); },
  set estoque(v){ localStorage.setItem('um_estq', JSON.stringify(v)); },
  get pedidos(){ return JSON.parse(localStorage.getItem('um_pedi')||'[]'); },
  set pedidos(v){ localStorage.setItem('um_pedi', JSON.stringify(v)); },
  get entregas(){ return JSON.parse(localStorage.getItem('um_entr')||'[]'); },
  set entregas(v){ localStorage.setItem('um_entr', JSON.stringify(v)); },
  get config(){ return JSON.parse(localStorage.getItem('um_cfg')||'{"empresa":"Stratos","cnpj":"","cidade":""}'); },
  set config(v){ localStorage.setItem('um_cfg', JSON.stringify(v)); },
  get requisicoes(){ return JSON.parse(localStorage.getItem('um_reqs')||'[]'); },
  set requisicoes(v){ localStorage.setItem('um_reqs', JSON.stringify(v)); },
};

let currentPage = 'dashboard';
let chartInstances = {};

// ─── NAVIGATION ───────────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`'${page}'`)) el.classList.add('active');
  });
  const titles = {
    dashboard: 'Dashboard', pedidos: 'Pedidos de Uniforme',
    fichas: 'Fichas de Colaboradores', movimentacoes: 'Movimentações de Entrega',
    estoque: 'Controle de Estoque',
    relatorios: 'Relatórios', importar: 'Importar Excel',
    funcionarios: 'Funcionários', manual: 'Manual de Uso'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};
  render(page);
}

function render(page) {
  const pages = {
    dashboard, pedidos, fichas, movimentacoes, estoque, relatorios, importar, funcionarios, manual
  };
  const fn = pages[page];
  if (fn) fn();
}

// ─── HELPERS ──────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function setContent(html){ $('app-content').innerHTML = html; }
function setActions(html){ $('topbar-actions').innerHTML = html; }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('pt-BR'); }
function fmtMoney(v){ return 'R$ '+(+v||0).toFixed(2).replace('.',','); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toISOString().slice(0,10); }

function openModal(title, body, footer='', large=false) {
  $('modal-title').innerHTML = title;
  $('modal-body').innerHTML = body;
  $('modal-footer').innerHTML = footer || '<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>';
  $('modal-box').className = 'modal'+(large?' modal-lg':'');
  $('modal-overlay-global').classList.add('show');
}
function closeModal(){ $('modal-overlay-global').classList.remove('show'); }
$('modal-overlay-global').addEventListener('click', e => { if(e.target.id==='modal-overlay-global') closeModal(); });

function toast(msg, type='success'){
  const t = document.createElement('div');
  const colors = {success:'#22c55e',danger:'#ef4444',warn:'#f97316',info:'#3b82f6'};
  t.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:9999;
    padding:10px 16px;border-radius:6px;background:#1a1a1a;color:#fff;
    border-left:3px solid ${colors[type]||colors.success};
    font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.5);
    animation:slideIn .2s ease;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// Turma color
function turmaColor(t=''){
  const colors = {
    'A': '#f59e0b', 'B': '#3b82f6', 'C': '#22c55e',
    'D': '#a855f7', 'E': '#f97316', 'I': '#ec4899', 'G': '#06b6d4'
  };
  const k = Object.keys(colors).find(k => t.includes('Turma '+k) || t.includes(k)) || 'A';
  return colors[k];
}

function importarEVerificarEstoque(){
  const raw = document.getElementById('forms-codigo')?.value?.trim();
  if(!raw) return toast('Cole o código do funcionário!','danger');
  const linhas = raw.split('\n').map(l=>l.trim());
  const linhaCodigo = linhas.find(l=>l.startsWith('UNI:')||l.startsWith('UNIMINA:'));
  if(!linhaCodigo) return toast('Código inválido! Copie o código completo.','danger');
  try {
    let pedido;
    if(linhaCodigo.startsWith('UNI:')){
      const mini = JSON.parse(decodeURIComponent(escape(atob(linhaCodigo.replace('UNI:','')))));
      pedido = {
        id:mini.id, matricula:mini.mat||'', nome:mini.nome, turma:mini.turma,
        centroCusto:mini.cc, setor:mini.cc, solicitante:mini.sol,
        matriculaSolicitante:mini.matSol, data:mini.data,
        itens:(mini.itens||[]).map(i=>({nome:i.n,tamanho:i.t,qtd:i.q||1,obs:i.o})),
        obs:mini.obs, codigoLegivel:mini.cod,
        status:'pendente', origem:'forms', funcao:'', responsavel:''
      };
    } else {
      pedido = JSON.parse(decodeURIComponent(escape(atob(linhaCodigo.replace('UNIMINA:','')))));
    }
    if(DB.pedidos.find(p=>p.id===pedido.id)){
      closeModal(); navigate('pedidos');
      return toast('Este pedido já foi importado antes!','warn');
    }
    // Verificar estoque
    const estq = DB.estoque;
    const verif = (pedido.itens||[]).map(item=>{
      const row = estq.find(e=>
        e.nome?.toLowerCase()===item.nome?.toLowerCase() &&
        String(e.tamanho).toLowerCase()===String(item.tamanho||'').toLowerCase()
      );
      const disp = row ? Math.min(+row.estoque||0, +item.qtd||1) : 0;
      return {...item, estoqueRow:row, estoqueAtual:+row?.estoque||0,
        qtdDisponivel:disp, qtdFaltante:Math.max(0,(+item.qtd||1)-disp), temEstoque:disp>=(+item.qtd||1)};
    });
    const peds = DB.pedidos;
    peds.push({...pedido, status:'pendente', verificacao:verif});
    DB.pedidos = peds;
    closeModal();
    abrirResultadoEstoque(pedido.id, verif);
  } catch(e){
    console.error(e);
    toast('Erro ao decodificar. Copie o código completo!','danger');
  }
}

function abrirResultadoEstoque(pedidoId, verif){
  const p = DB.pedidos.find(p=>p.id===pedidoId);
  if(!p) return;
  const itensCom = verif.filter(v=>v.qtdDisponivel>0);
  const itensSem = verif.filter(v=>v.qtdFaltante>0);
  const todosOk = verif.every(v=>v.temEstoque);
  const algumOk = verif.some(v=>v.qtdDisponivel>0);

  const alertHtml = todosOk
    ? `<div class="alert alert-success">✅ Todos os itens disponíveis no estoque!</div>`
    : algumOk
    ? `<div class="alert alert-warn">⚠ Estoque parcial — ${itensCom.length} disponível(is), ${itensSem.length} precisa(m) de reposição.</div>`
    : `<div class="alert alert-danger">❌ Nenhum item disponível. Necessário solicitar ao armazém.</div>`;

  openModal(`📦 Verificação de Estoque — ${p.nome}`,`
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">
      <strong>${p.nome}</strong> | Mat: ${p.matricula} | Turma: ${p.turma||'—'} | C.C.: ${p.centroCusto||'—'}
    </div>
    ${alertHtml}
    <div class="tbl-wrap" style="margin-bottom:14px"><table>
      <thead><tr><th>Item</th><th>Tamanho</th><th>Pedido</th><th>Estoque</th><th>Disponível</th><th>Status</th></tr></thead>
      <tbody>${verif.map(v=>`<tr>
        <td>${v.nome}</td><td>${v.tamanho||'—'}</td>
        <td style="text-align:center">${v.qtd||1}</td>
        <td style="text-align:center;font-weight:bold;color:${v.estoqueAtual>0?'var(--success)':'var(--danger)'}">${v.estoqueAtual}</td>
        <td style="text-align:center;font-weight:bold;color:${v.qtdDisponivel>0?'var(--success)':'var(--danger)'}">${v.qtdDisponivel}</td>
        <td>${v.qtdFaltante>0?`<span class="badge badge-low">Falta ${v.qtdFaltante}</span>`:'<span class="badge badge-ok">OK</span>'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${itensCom.length>0?`<button class="btn btn-success" onclick="gerarEntregaDisponivel('${pedidoId}')">✅ Gerar Ficha de Entrega (${itensCom.length} item(s) disponível(is))</button>`:''}
      ${itensSem.length>0?`<button class="btn btn-secondary" onclick="gerarSolicitacaoArmazem('${pedidoId}')">📤 Solicitar ao Armazém (${itensSem.length} item(s) em falta)</button>`:''}
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal();navigate('pedidos')">Ver em Pedidos</button>`,true);
}

function gerarEntregaDisponivel(pedidoId){
  const p = DB.pedidos.find(p=>p.id===pedidoId);
  if(!p) return;
  const verif = p.verificacao || p.itens.map(i=>({...i,qtdDisponivel:i.qtd,qtdFaltante:0}));
  const itensEntrega = verif.filter(v=>v.qtdDisponivel>0).map(v=>({...v,qtd:v.qtdDisponivel}));
  // Baixar estoque
  const estq = DB.estoque;
  itensEntrega.forEach(item=>{
    const row = estq.find(e=>e.nome===item.nome&&String(e.tamanho)===String(item.tamanho||''));
    if(row) row.estoque = Math.max(0,(+row.estoque||0)-(+item.qtd||1));
  });
  DB.estoque = estq;
  // Registrar na ficha do funcionário
  const entr = DB.entregas;
  entr.push({
    id: genId(), matricula: p.matricula, nome: p.nome, turma: p.turma,
    centroCusto: p.centroCusto, data: today(),
    itens: itensEntrega.map(i=>{
      const row = estq.find(e=>e.nome===i.nome&&String(e.tamanho)===String(i.tamanho||''));
      return {...i, valor: row?.valor||0};
    }),
    pedidoId: p.id, origem: p.origem||'manual'
  });
  DB.entregas = entr;
  // Atualizar pedido
  const peds = DB.pedidos;
  const idx = peds.findIndex(pp=>pp.id===pedidoId);
  const faltantes = verif.filter(v=>v.qtdFaltante>0);
  peds[idx].status = faltantes.length>0?'parcial':'entregue';
  peds[idx].entregueEm = new Date().toISOString();
  DB.pedidos = peds;
  closeModal();
  toast('✅ Entrega registrada na ficha! Abrindo ficha para impressão...');
  setTimeout(()=>imprimirFicha(p.matricula), 400);
}

function gerarSolicitacaoArmazem(pedidoId){
  const p = DB.pedidos.find(p=>p.id===pedidoId);
  if(!p) return;
  const verif = p.verificacao || p.itens.map(i=>({...i,qtdFaltante:i.qtd,estoqueAtual:0,estoqueRow:null}));
  const itensFalt = verif.filter(v=>v.qtdFaltante>0);
  const req = {
    id: genId(),
    numero: 'REQ-'+String(DB.requisicoes.length+1).padStart(4,'0'),
    data: today(), origem:'forms', pedidoId: p.id,
    colaborador: p.nome, matricula: p.matricula,
    itens: itensFalt.map(i=>({
      codigo:i.estoqueRow?.codigo||'', nome:i.nome, tamanho:i.tamanho||'',
      estoqueAtual:i.estoqueAtual||0, valor:i.estoqueRow?.valor||0, qtdSolicitada:i.qtdFaltante
    })),
    obs:`Pedido via Forms — ${p.nome} (Mat. ${p.matricula}) — ${p.turma}`,
    total: itensFalt.reduce((s,i)=>s+(i.estoqueRow?.valor||0)*i.qtdFaltante,0),
    status:'pendente', criadoEm: new Date().toISOString()
  };
  const reqs = DB.requisicoes;
  reqs.push(req);
  DB.requisicoes = reqs;
  closeModal();
  toast(`📤 Requisição ${req.numero} gerada! Abrindo para impressão...`);
  setTimeout(()=>imprimirRequisicao(req.id), 400);
}

function savePedido(){
  const mat = $('ped-func').value;
  const data = $('ped-data').value;
  if(!mat) return toast('Selecione o colaborador!','danger');

  const func = DB.funcionarios.find(f=>f.matricula===mat);
  const itens = [];
  document.querySelectorAll('.item-row').forEach(row=>{
    const idx = row.id.replace('item-row-','');
    const nome = $(`item-nome-${idx}`)?.value;
    const tam = $(`item-tam-${idx}`)?.value;
    const qtd = +$(`item-qtd-${idx}`)?.value||1;
    if(nome) itens.push({nome, tamanho:tam, qtd});
  });
  if(!itens.length) return toast('Adicione pelo menos um item!','danger');

  const peds = DB.pedidos;
  peds.push({
    id: genId(),
    matricula: mat,
    nome: func?.nome||mat,
    turma: func?.turma||'',
    funcao: func?.funcao||'',
    responsavel: func?.responsavel||'',
    data,
    itens,
    obs: $('ped-obs').value,
    status: 'pendente',
    criadoEm: new Date().toISOString()
  });
  DB.pedidos = peds;
  closeModal();
  toast('Pedido registrado!');
  renderPedidos();
}

  openModal(`Pedido #${p.id.slice(-6)}`,`

function aprovarPedido(id){
  const peds = DB.pedidos;
  const p = peds.find(p=>p.id===id);
  if(p){ p.status='aprovado'; DB.pedidos=peds; renderPedidos(); toast('Pedido aprovado!'); }
}

function entregarPedido(id){
  const peds = DB.pedidos;
  const p = peds.find(p=>p.id===id);
  if(!p) return;

  // Baixar estoque
  const estq = DB.estoque;
  const alertas = [];
  (p.itens||[]).forEach(item=>{
    const row = estq.find(e=>e.nome===item.nome && e.tamanho==item.tamanho);
    if(row){
      row.estoque = Math.max(0,(+row.estoque||0)-(+item.qtd||1));
      if(row.estoque < 3) alertas.push(`${item.nome} (${item.tamanho}): ${row.estoque} restantes`);
    }
  });
  DB.estoque = estq;

  // Registrar entrega
  const entr = DB.entregas;
  const func = DB.funcionarios.find(f=>f.matricula===p.matricula);
  entr.push({
    id: genId(),
    matricula: p.matricula,
    nome: p.nome,
    turma: p.turma,
    data: today(),
    itens: (p.itens||[]).map(i=>{
      const row = estq.find(e=>e.nome===i.nome&&e.tamanho==i.tamanho);
      return {...i, valor: row?.valor||0};
    }),
    pedidoId: p.id
  });
  DB.entregas = entr;

  p.status='entregue';
  p.entregueEm = new Date().toISOString();
  DB.pedidos = peds;

  if(alertas.length) toast(`⚠ Estoque baixo: ${alertas[0]}`,'warn');
  else toast('Uniforme entregue e estoque atualizado!');
  renderPedidos();
}

function deletePedido(id){
  if(!confirm('Excluir este pedido?')) return;
  DB.pedidos = DB.pedidos.filter(p=>p.id!==id);
  renderPedidos();
  toast('Pedido excluído.','warn');
}

  $('estq-content').innerHTML = `

      <thead><tr><th>Código</th><th>Item</th><th>Tamanho</th><th>Valor Unit.</th><th>Estoque</th><th>Status</th><th>Ações</th></tr></thead>

      ${sorted.length===0?`<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px">Nenhum item encontrado.</td></tr>`:''}
      ${sorted.map(e=>{
        const qty = +e.estoque||0;

        return `<tr>
          <td><small style="color:var(--text-muted)">${e.codigo||'—'}</small></td>
          <td><strong>${e.nome}</strong></td>
          <td>${e.tamanho||'—'}</td>
          <td><input type="number" class="form-control" style="width:90px;padding:4px 6px" value="${(+e.valor||0).toFixed(2)}" onchange="updateEstqValor('${e.codigo||e.nome+e.tamanho}',this.value,'valor')" step="0.01"></td>
          <td><div class="qty-cell"><input type="number" value="${qty}" min="0" onchange="updateEstqQty('${e.codigo||e.nome+e.tamanho}',this.value)"><span style="color:var(--text-muted);font-size:11px">un</span></div></td>
          <td>${badge}</td>
          <td><button class="btn btn-xs btn-danger" onclick="deleteEstqItem('${e.codigo||e.nome+e.tamanho}')">✕</button></td>
        </tr>`;
      }).join('')}

  `;

function updateEstqValor(key, val){
  const estq = DB.estoque;

  const criticos = estq.filter(e=>(+e.estoque||0)<3);

    return `<tr style="${isCrit?'background:rgba(192,57,43,0.05)':''}">

  openModal('📤 Solicitar Reposição ao Depósito',`
    ${criticos.length?`<div class="alert alert-danger">⚠ ${criticos.length} item(s) com estoque crítico (< 3) já marcados automaticamente.</div>`:'<div class="alert alert-info">Selecione os itens e quantidades a solicitar ao depósito.</div>'}

          <th style="background:var(--teal);color:#fff;padding:8px">Qtd.</th>

        <td colspan="7" style="text-align:right;font-weight:bold;padding:8px 12px;border-top:2px solid var(--border)">TOTAL DA REQUISIÇÃO:</td>
        <td id="dep-grand-total" style="font-weight:bold;color:var(--primary);padding:8px 12px;border-top:2px solid var(--border)">${fmtMoney(criticos.reduce((s,e)=>s+(+e.valor||0)*10,0))}</td>
      </tr></tfoot>

      <label class="form-label">Observações / Urgência</label>
      <textarea class="form-control" id="dep-obs" rows="2" placeholder="Ex: Urgente — turma A em campo na próxima semana..."></textarea>
    </div>
  `,`

    <button class="btn btn-primary" onclick="confirmarRequisicao()">📤 Registrar e Imprimir Requisição</button>
  `, true);

  // Atualizar totais ao mudar qtd
  setTimeout(()=>{
    estq.forEach((e,i)=>{
      const input = $(`dep-qty-${i}`);
      if(input) input.addEventListener('input', ()=>{
        const v = (+input.value||0)*(+e.valor||0);
        const td = $(`dep-total-${i}`);
        if(td) td.textContent = fmtMoney(v);
        // recalc grand total
        let grand = 0;
        estq.forEach((_,j)=>{
          const chk = $(`dep-chk-${j}`);
          const inp = $(`dep-qty-${j}`);
          if(chk?.checked) grand += (+inp?.value||0)*(+estq[j].valor||0);
        });
        const gt = $('dep-grand-total');
        if(gt) gt.textContent = fmtMoney(grand);
      });
    });
    window._reqEstq = estq;
  }, 50);
}

function confirmarRequisicao(){
  const estq = window._reqEstq || DB.estoque;
  const itens = [];
  estq.forEach((e,i)=>{
    const chk = $(`dep-chk-${i}`);
    const qty = +($(`dep-qty-${i}`)?.value||0);
    if(chk?.checked && qty > 0){
      itens.push({
        codigo: e.codigo,
        nome: e.nome,
        tamanho: e.tamanho,
        estoqueAtual: +e.estoque||0,
        valor: +e.valor||0,
        qtdSolicitada: qty
      });
    }
  });
  if(!itens.length) return toast('Selecione pelo menos um item com quantidade!','danger');
  const obs = $('dep-obs')?.value||'';
  const totalReq = itens.reduce((s,i)=>s+(i.valor*i.qtdSolicitada),0);

  const req = {
    id: genId(),
    numero: 'REQ-'+String(DB.requisicoes.length+1).padStart(4,'0'),
    data: today(),
    itens,
    obs,
    total: totalReq,
    status: 'pendente',
    criadoEm: new Date().toISOString()
  };

  const reqs = DB.requisicoes;
  reqs.push(req);
  DB.requisicoes = reqs;

  closeModal();
  toast(`Requisição ${req.numero} registrada! Abrindo para impressão...`);
  setTimeout(()=>imprimirRequisicao(req.id), 400);
}

function relatorioCustoTurma(){

  entr.forEach(e=>{

}

function gerarRelatCC(){
  const funcs = DB.funcionarios;
  const entr = DB.entregas;
  const dataFiltro = $('cc-filtro-data') ? $('cc-filtro-data').value : ($('cc-data')?.value||'');
  const ccFiltro = $('cc-filtro')?.value||'';

  // Filtrar entregas
  let entrs = entr;
  if(dataFiltro) entrs = entrs.filter(e=>e.data===dataFiltro);

  // Agrupar por CC
  const grupos = {};
  entrs.forEach(e=>{
    const f = funcs.find(f=>f.matricula===e.matricula);
    const cc = f?.centroCusto||'Sem C.C.';
    if(ccFiltro && cc!==ccFiltro) return;
    if(!grupos[cc]) grupos[cc]=[];
    grupos[cc].push({...e, func:f});
  });

  if(!Object.keys(grupos).length){
    $('cc-resultado').innerHTML='<div class="alert alert-info">Nenhuma entrega encontrada para os filtros selecionados.</div>';
    return;
  }

  let html = '';
  let totalGeral = 0;
  Object.keys(grupos).sort().forEach(cc=>{
    const items = grupos[cc];
    const totalCC = items.reduce((s,e)=>{
      return s+(e.itens||[]).reduce((ss,i)=>ss+(+i.valor||0)*(+i.qtd||1),0);
    },0);
    totalGeral += totalCC;
    html += `
    <div style="margin-bottom:16px">
      <div style="background:var(--teal);color:#fff;padding:8px 12px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between">
        <strong>Centro de Custo: ${cc}</strong>
        <strong>${fmtMoney(totalCC)}</strong>
      </div>
      <div class="tbl-wrap" style="border-radius:0 0 6px 6px">
      <table>
        <thead><tr><th>Data</th><th>Colaborador</th><th>Matrícula</th><th>Turma</th><th>Item</th><th>Tam.</th><th>Qtd</th><th>Valor Unit.</th><th>Total</th></tr></thead>
        <tbody>
        ${items.flatMap(e=>(e.itens||[]).map(i=>`<tr>
          <td>${fmtDate(e.data)}</td>
          <td>${e.nome}</td>
          <td>${e.matricula}</td>
          <td>${e.func?.turma||'—'}</td>
          <td>${i.nome}</td>
          <td>${i.tamanho||'—'}</td>
          <td>${i.qtd||1}</td>
          <td>${fmtMoney(i.valor)}</td>
          <td style="font-weight:bold">${fmtMoney((+i.valor||0)*(+i.qtd||1))}</td>
        </tr>`)).join('')}
        </tbody>
      </table></div>
    </div>`;
  });

  html += `<div style="text-align:right;font-size:15px;font-weight:bold;padding:12px;background:var(--primary-dim);border-radius:6px;color:var(--primary)">
    TOTAL GERAL: ${fmtMoney(totalGeral)}
  </div>`;

  $('cc-resultado').innerHTML = html;
}

function importFuncionarios(input){ if(input.files[0]) processImportFunc(input.files[0]); }
function processImportFunc(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try {
      const wb = XLSX.read(e.target.result,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Detectar linha de cabeçalho (busca por 'Matricula' ou 'matrícula')
      let headerRow = 0;
      for(let i=0;i<Math.min(5,data.length);i++){
        if(data[i].some(c=>String(c).toLowerCase().includes('matricula')||String(c).toLowerCase().includes('matrícula'))){
          headerRow=i; break;
        }
      }
      const rows = data.slice(headerRow+1).filter(r=>r[1]||r[2]);
      window._importFuncs = rows.map(r=>({
        gerencia: String(r[0]||'Gerência de Operação Mina').trim(),
        matricula: String(r[1]||'').trim(),
        nome: String(r[2]||'').trim().toUpperCase(),
        turma: String(r[3]||'').trim(),
        funcao: String(r[4]||'').trim(),
        responsavel: String(r[5]||'').trim()
      })).filter(f=>f.matricula&&f.nome);

      renderImportPreview();
    } catch(err) {
      toast('Erro ao ler o arquivo Excel. Verifique o formato.','danger');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function confirmarImportFunc(){
  // Ler todas as linhas visíveis da tabela
  const tbody = $('import-func-tbody');
  if(!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const funcs = [];
  rows.forEach(tr=>{
    const id = tr.id.replace('imp-row-','');
    const mat = $(`imp-mat-${id}`)?.value?.trim();
    const nome = $(`imp-nome-${id}`)?.value?.trim().toUpperCase();
    if(!mat||!nome) return;
    funcs.push({
      matricula: mat,
      nome,
      turma: $(`imp-turma-${id}`)?.value?.trim()||'',
      funcao: $(`imp-funcao-${id}`)?.value?.trim()||'',
      responsavel: $(`imp-resp-${id}`)?.value?.trim()||'',
      gerencia: 'Gerência de Operação Mina'
    });
  });

  if(!funcs.length) return toast('Nenhum dado para importar!','danger');

  const existentes = DB.funcionarios;
  const novos = funcs.filter(f=>!existentes.find(e=>e.matricula===f.matricula));
  const merged = existentes.map(e=>{
    const upd = funcs.find(f=>f.matricula===e.matricula);
    return upd||e;
  });
  novos.forEach(f=>merged.push(f));
  DB.funcionarios = merged;
  toast(`${funcs.length} colaboradores importados! (${novos.length} novos, ${funcs.length-novos.length} atualizados)`);
  $('import-func-preview').innerHTML='<div class="alert alert-success">✅ Importação concluída! Total: '+merged.length+' colaboradores cadastrados.</div>';
}

function importEstoque(input){ if(input.files[0]) processImportEstq(input.files[0]); }
function processImportEstq(file){
  const reader = new FileReader();
  reader.onload = e=>{
    const wb = XLSX.read(e.target.result,{type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws,{header:1});
    const rows = data.slice(1).filter(r=>r[1]);
    const items = rows.map(r=>({
      codigo: String(r[0]||'').trim(),
      nome: String(r[1]||'').trim(),
      valor: +r[2]||0,
      tamanho: String(r[3]||'').trim(),
      estoque: +r[4]||0
    })).filter(i=>i.nome&&i.nome!=='NOME DO ITEM');

    window._importEstq = items;
    $('import-estq-preview').innerHTML = `
      <div class="alert alert-success">✅ ${items.length} itens encontrados</div>
      <div class="tbl-wrap" style="max-height:300px;overflow-y:auto"><table>
      <thead><tr><th>Código</th><th>Item</th><th>Tamanho</th><th>Valor</th><th>Estoque</th></tr></thead>
      <tbody>${items.slice(0,10).map(i=>`<tr><td>${i.codigo}</td><td>${i.nome}</td><td>${i.tamanho}</td><td>${fmtMoney(i.valor)}</td><td>${i.estoque}</td></tr>`).join('')}</tbody>
      </table></div>
      ${items.length>10?`<div style="color:var(--text-muted);font-size:12px;margin-top:8px">... e mais ${items.length-10} itens</div>`:''}
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="confirmarImportEstq()">✅ Importar ${items.length} itens</button>
        <button class="btn btn-secondary" onclick="$('import-estq-preview').innerHTML=''">Cancelar</button>
      </div>`;
  };
  reader.readAsArrayBuffer(file);
}

function confirmarImportEstq(){
  DB.estoque = window._importEstq||[];
  toast(`${DB.estoque.length} itens importados no estoque!`);
  $('import-estq-preview').innerHTML='<div class="alert alert-success">✅ Importação concluída!</div>';
}

function exportarBackup(){
  const data = JSON.stringify({
    funcionarios: DB.funcionarios,
    estoque: DB.estoque,
    pedidos: DB.pedidos,
    entregas: DB.entregas,
    requisicoes: DB.requisicoes,
    config: DB.config,
    exportadoEm: new Date().toISOString()
  }, null, 2);
  const a = document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='unimina_backup_'+today()+'.json';
  a.click();
  toast('Backup exportado!');
}

function restaurarBackup(input){
  const f = input.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.funcionarios) DB.funcionarios=data.funcionarios;
      if(data.estoque) DB.estoque=data.estoque;
      if(data.pedidos) DB.pedidos=data.pedidos;
      if(data.entregas) DB.entregas=data.entregas;
      if(data.requisicoes) DB.requisicoes=data.requisicoes;
      if(data.config) DB.config=data.config;
      toast('Backup restaurado com sucesso!');
      navigate(currentPage);
    }catch(err){ toast('Erro ao ler o backup!','danger'); }
  };
  r.readAsText(f);
}

function limparDados(){
  if(!confirm('⚠ ATENÇÃO: Isso apagará TODOS os dados! Tem certeza?')) return;
  if(!confirm('Confirma mesmo? Esta ação não pode ser desfeita!')) return;
  ['um_func','um_estq','um_pedi','um_entr','um_reqs','um_cfg'].forEach(k=>localStorage.removeItem(k));
  toast('Dados apagados.','warn');
  navigate(currentPage);
}

function saveNewFunc(){
  const mat = $('nf-mat').value.trim();
  const nome = $('nf-nome').value.trim().toUpperCase();
  if(!mat||!nome) return toast('Matrícula e nome obrigatórios!','danger');
  const funcs = DB.funcionarios;
  if(funcs.find(f=>f.matricula===mat)) return toast('Matrícula já cadastrada!','danger');
  funcs.push({
    matricula:mat,nome,
    turma:$('nf-turma').value,
    funcao:$('nf-func').value,
    centroCusto:$('nf-cc').value,
    responsavel:$('nf-resp').value,
    gerencia:$('nf-ger').value
  });
  DB.funcionarios=funcs;
  closeModal();
  toast('Colaborador cadastrado!');
  renderFuncs();

function editFunc(mat){
  const func = DB.funcionarios.find(f=>f.matricula===mat);
  if(!func) return;
  openModal('Editar Colaborador',`
    <div class="form-grid form-grid-2">
      <div class="form-group"><label class="form-label">Matrícula</label><input class="form-control" id="ef-mat" value="${func.matricula}" disabled></div>

      <div class="form-group"><label class="form-label">Função</label><input class="form-control" id="ef-func" value="${func.funcao||''}"></div>
      <div class="form-group"><label class="form-label">Centro de Custo</label><input class="form-control" id="ef-cc" value="${func.centroCusto||''}"></div>
      <div class="form-group"><label class="form-label">Responsável</label><input class="form-control" id="ef-resp" value="${func.responsavel||''}"></div>
      <div class="form-group"><label class="form-label">Gerência</label><input class="form-control" id="ef-ger" value="${func.gerencia||'Gerência de Operação Mina'}"></div>
    </div>
  `,`
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveEditFunc('${mat}')">Salvar</button>
  `);
}

function saveEditFunc(mat){
  const funcs = DB.funcionarios;
  const idx = funcs.findIndex(f=>f.matricula===mat);
  if(idx<0) return;
  funcs[idx] = {...funcs[idx],
    nome:$('ef-nome').value.trim().toUpperCase(),
    turma:$('ef-turma').value,
    funcao:$('ef-func').value,
    centroCusto:$('ef-cc').value,
    responsavel:$('ef-resp').value,
    gerencia:$('ef-ger').value
  };
  DB.funcionarios=funcs;
  closeModal();
  toast('Colaborador atualizado!');
  renderFuncs();
}

function deleteFunc(mat){
  if(!confirm('Excluir este colaborador?')) return;
  DB.funcionarios = DB.funcionarios.filter(f=>f.matricula!==mat);
  toast('Colaborador excluído.','warn');
  renderFuncs();
}

// ─── INIT ─────────────────────────────────────────────────────────
// Verificar se veio via QR Code (URL com ?pedido=)
(function checkQRImport(){
  try {
    const params = new URLSearchParams(window.location.search);
    const pedidoParam = params.get('pedido');
    if(!pedidoParam) return;

    const pedido = JSON.parse(decodeURIComponent(escape(atob(pedidoParam))));
    const peds = DB.pedidos;
    if(peds.find(p=>p.id===pedido.id)){
      // Já importado — apenas navegar para pedidos
      setTimeout(()=>{
        navigate('pedidos');
        toast('Este pedido já foi importado anteriormente.','info');
      }, 500);
      return;
    }
    peds.push({...pedido, status:'pendente'});
    DB.pedidos = peds;

    // Limpar URL para não reimportar ao recarregar
    window.history.replaceState({}, document.title, window.location.pathname);

    setTimeout(()=>{
      navigate('pedidos');
      toast(`✅ Pedido de ${pedido.nome} importado via QR Code!`);
    }, 500);
  } catch(e){ /* URL sem pedido, ignorar */ }
})();

navigate('dashboard');
</script>
